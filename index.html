<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #ffd400, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main Card */
.container {
  width: 92%;
  max-width: 370px;
  padding: 25px;
  border-radius: 35px;
  text-align: center;
  color: white;
  background: linear-gradient(180deg, #7f8f2e, #000);
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
}

/* Top Badge */
.badge {
  background: linear-gradient(90deg,#ffd400,#fff176);
  color: #000;
  padding: 14px;
  border-radius: 40px;
  font-weight: 800;
  font-size: 14px;
  box-shadow: 0 0 25px rgba(255,212,0,1);
}

/* Logo */
.logo {
  width: 135px;
  height: 135px;
  margin: 22px auto;
  border-radius: 50%;
  border: 6px solid #ffd400;
  background: url('https://raw.githubusercontent.com/dillubhai90/Dillu-Prediction-/main/IMG_20260328_063931_373.jpg') center/cover;
  box-shadow: 0 0 25px rgba(255,212,0,0.9);
}

/* Heading */
h1 {
  font-size: 26px;
  font-weight: 800;
  color: #0a2a66;
  text-shadow: 0 3px 8px rgba(0,0,0,0.6);
  margin: 10px 0;
}

/* Subtitle */
p {
  font-size: 14px;
  opacity: 0.9;
}

/* Fake Live Counter */
.live {
  margin-top: 10px;
  font-size: 13px;
  color: #ff4d4d;
  font-weight: 600;
}

/* Stats */
.stats {
  display: flex;
  justify-content: space-between;
  margin: 25px 0;
}

.stat-box {
  width: 30%;
  padding: 12px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);
  box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
}

.stat-box b {
  color: #ffd400;
  font-size: 18px;
}

/* Button */
.btn {
  display: block;
  margin-top: 20px;
  padding: 17px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 800;
  font-size: 16px;
  color: black;
  background: linear-gradient(90deg,#ffd400,#fff176);
  box-shadow: 0 0 30px rgba(255,212,0,1);
  animation: zoomPulse 1s infinite alternate;
}

/* Animation */
@keyframes zoomPulse {
  from { transform: scale(1); box-shadow: 0 0 20px rgba(255,212,0,0.7); }
  to { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,212,0,1); }
}

/* Countdown */
.countdown {
  margin-top: 12px;
  font-size: 13px;
  opacity: 0.85;

<div class="container">

  <div class="stats">
    <div class="stat-box">
      <b>98%</b><br>Accuracy
    </div>
    <div class="stat-box">
      <b>FREE</b><br>Joining
    </div>
    <div class="stat-box">
      <b>24/7</b><br>Support
    </div>
  </div>

  <a href="https://telegram.me/+Jg-QXZpLa3g2ZGVl" class="btn">
    JOIN TELEGRAM →
  </a>

  <div class="countdown">
    Auto redirect in <span id="timer">60</span> seconds
  </div>

</div>

<script>
/* Countdown */
let time = 60;
let timer = document.getElementById("timer");

let countdown = setInterval(() => {
  time--;
  timer.innerText = time;

  if(time <= 0){
    clearInterval(countdown);
    window.location.href = "https://telegram.me/+Jg-QXZpLa3g2ZGVl";
  }
},1000);

/* Fake Live Counter */
setInterval(()=>{
  document.getElementById("rand").innerText = Math.floor(100 + Math.random()*900);
},2000);
</script>
